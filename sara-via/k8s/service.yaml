apiVersion: v1
kind: Service
metadata:
  name: sara-via-server
spec:
  selector:
    app: sara-via-server
  ports:
    - name: http
      port: 80
      targetPort: 4000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sara-via-web
spec:
  selector:
    app: sara-via-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: LoadBalancer
