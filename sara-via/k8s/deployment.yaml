apiVersion: apps/v1
kind: Deployment
metadata:
  name: sara-via-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sara-via-server
  template:
    metadata:
      labels:
        app: sara-via-server
    spec:
      containers:
        - name: server
          image: ghcr.io/your-org/sara-via-server:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: sara-via-secrets
          resources:
            requests:
              cpu: '500m'
              memory: '512Mi'
            limits:
              cpu: '2'
              memory: '2Gi'
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sara-via-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sara-via-worker
  template:
    metadata:
      labels:
        app: sara-via-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/sara-via-server:latest
          command: ["npm", "run", "start:worker", "-w", "apps/server"]
          envFrom:
            - secretRef:
                name: sara-via-secrets
          resources:
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sara-via-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sara-via-web
  template:
    metadata:
      labels:
        app: sara-via-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/sara-via-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sara-via-web-config
          resources:
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
